name: Export Site Bundle

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: export-site-main
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    environment: production
    env:
      BLOG_SLUG: travels
      ADMIN_API_BASE_URL: ${{ secrets.ADMIN_API_BASE_URL }}
      ADMIN_INTERNAL_SECRET: ${{ secrets.ADMIN_INTERNAL_SECRET }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.ADMIN_API_BASE_URL }}" ]; then
            echo "::error::ADMIN_API_BASE_URL secret is required."
            exit 1
          fi
          if [ -z "${{ secrets.ADMIN_INTERNAL_SECRET }}" ]; then
            echo "::error::ADMIN_INTERNAL_SECRET secret is required."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch ko/en bundles and write site + posts
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const baseRaw = String(process.env.ADMIN_API_BASE_URL || '').replace(/\/+$/, '');
          const base = baseRaw.replace(/\/v1(?:\/admin)?$/i, '');
          const slug = String(process.env.BLOG_SLUG || '').trim();
          const secret = String(process.env.ADMIN_INTERNAL_SECRET || '').trim();

          if (!base || !slug || !secret) {
            throw new Error('Missing required env vars (ADMIN_API_BASE_URL, BLOG_SLUG, ADMIN_INTERNAL_SECRET).');
          }

          async function fetchBundle(locale) {
            const primary = `${base}/v1/admin/blogs/${encodeURIComponent(slug)}/site-bundle?locale=${encodeURIComponent(locale)}`;
            const fallback = `${base}/admin/blogs/${encodeURIComponent(slug)}/site-bundle?locale=${encodeURIComponent(locale)}`;

            const call = async (url) => {
              const res = await fetch(url, {
                headers: {
                  'X-Admin-Internal-Secret': secret,
                  Accept: 'application/json',
                },
              });
              const text = await res.text();
              return { res, text, url };
            };

            let parsed = null;
            const first = await call(primary);
            if (first.res.ok) {
              parsed = JSON.parse(first.text);
              console.log(`bundle ${locale}: ${first.url}`);
            } else if (first.res.status === 404) {
              console.warn(`bundle ${locale} 404: ${first.url}`);
              const second = await call(fallback);
              if (!second.res.ok) {
                throw new Error(`bundle ${locale} fallback ${second.res.status}: ${second.text.slice(0, 1200)}`);
              }
              parsed = JSON.parse(second.text);
              console.log(`bundle ${locale}: ${second.url}`);
            } else {
              throw new Error(`bundle ${locale} primary ${first.res.status}: ${first.text.slice(0, 1200)}`);
            }
            const bundle = parsed?.data;
            if (!bundle || !Array.isArray(bundle.posts) || !Array.isArray(bundle.categories)) {
              throw new Error(`Invalid bundle shape for locale=${locale}`);
            }
            return bundle;
          }

          function writePostsMd(bundle, subdir) {
            const postsDir = path.join(process.cwd(), 'src', 'data', 'posts', subdir);
            fs.mkdirSync(postsDir, { recursive: true });
            const slugSet = new Set();
            for (const row of bundle.posts) {
              const s = String(row?.slug || '').trim();
              if (!s) continue;
              slugSet.add(s);
              const body = typeof row.content === 'string' ? row.content : '';
              fs.writeFileSync(path.join(postsDir, `${s}.md`), body, 'utf8');
            }
            for (const file of fs.readdirSync(postsDir)) {
              if (!file.endsWith('.md')) continue;
              const s = file.slice(0, -3);
              if (!slugSet.has(s)) fs.rmSync(path.join(postsDir, file));
            }
            return slugSet.size;
          }

          function stripLegacyFlatMd() {
            const root = path.join(process.cwd(), 'src', 'data', 'posts');
            if (!fs.existsSync(root)) return;
            for (const ent of fs.readdirSync(root, { withFileTypes: true })) {
              if (ent.isFile() && ent.name.endsWith('.md')) {
                fs.rmSync(path.join(root, ent.name));
              }
            }
          }

          function buildSiteJson(existing, bundle) {
            const postsMeta = [];
            for (const row of bundle.posts) {
              const s = String(row?.slug || '').trim();
              if (!s) continue;
              const { content: _c, ...meta } = row;
              postsMeta.push(meta);
            }
            return {
              ...existing,
              blogId: bundle.blogId,
              blogName: bundle.blogName || existing.blogName,
              tagline: bundle.tagline || existing.tagline || '',
              categories: bundle.categories,
              posts: postsMeta,
              best: bundle.best || [],
            };
          }

          (async () => {
            const siteKoPath = path.join(process.cwd(), 'src', 'data', 'site.ko.json');
            const siteEnPath = path.join(process.cwd(), 'src', 'data', 'site.en.json');
            const siteLegacyPath = path.join(process.cwd(), 'src', 'data', 'site.json');

            const existingKo = JSON.parse(fs.readFileSync(siteKoPath, 'utf8'));
            const existingEn = JSON.parse(fs.readFileSync(siteEnPath, 'utf8'));

            const [bundleKo, bundleEn] = await Promise.all([fetchBundle('ko'), fetchBundle('en')]);

            const nextKo = buildSiteJson(existingKo, bundleKo);
            const nextEn = buildSiteJson(existingEn, bundleEn);

            fs.writeFileSync(siteKoPath, `${JSON.stringify(nextKo, null, 2)}\n`, 'utf8');
            fs.writeFileSync(siteEnPath, `${JSON.stringify(nextEn, null, 2)}\n`, 'utf8');
            fs.writeFileSync(siteLegacyPath, `${JSON.stringify(nextKo, null, 2)}\n`, 'utf8');

            stripLegacyFlatMd();
            const nKo = writePostsMd(bundleKo, 'ko');
            const nEn = writePostsMd(bundleEn, 'en');
            console.log(`synced: site.ko/en + site.json mirror; posts ko=${nKo} en=${nEn}`);
          })().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          NODE

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain -- src/data/site.ko.json src/data/site.en.json src/data/site.json src/data/posts)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git status --short src/data/site.ko.json src/data/site.en.json src/data/site.json src/data/posts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/site.ko.json src/data/site.en.json src/data/site.json src/data/posts
          git commit -m "자동 동기화: site bundle (ko/en)"
          git push origin HEAD:main
